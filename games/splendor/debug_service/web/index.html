<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DinoBoard Intelligence Splendor Debug</title>
    <link rel="stylesheet" href="general-web/theme.css" />
    <link rel="stylesheet" href="web/styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <h1>DinoBoard Intelligence</h1>
        <div class="game-switcher-wrap">
          <label for="game-selector">切换游戏</label>
          <select id="game-selector"></select>
        </div>

        <div class="card">
          <h2>开局</h2>
          <div class="side-grid">
            <button id="btn-side-first" class="side-btn active" type="button">玩家先手</button>
            <button id="btn-side-second" class="side-btn" type="button">玩家后手</button>
            <button id="btn-side-random" class="side-btn" type="button">随机</button>
          </div>
          <label>难度</label>
          <div class="difficulty-grid">
            <button id="btn-diff-heuristic" class="side-btn" type="button">启发式</button>
            <button id="btn-diff-experience" class="side-btn active" type="button">体验</button>
            <button id="btn-diff-expert" class="side-btn" type="button">专家</button>
            <button id="btn-diff-master" class="side-btn" type="button">大师</button>
          </div>
          <button id="btn-start">开始对局</button>
          <div id="start-msg" class="muted"></div>
        </div>

        <div class="card">
          <h2>高级功能</h2>
          <button id="btn-undo">悔棋</button>
          <button id="btn-force">替对手落子</button>
          <button id="btn-hint">智能提示</button>
          <div id="ops-msg" class="muted"></div>
        </div>
      </aside>

      <section class="board-stage" id="board-stage">
        <div class="card board-card">
          <div class="general-hints">
            <div class="general-hint-line" id="hint-turn-line">当前轮到：--</div>
            <div class="general-hint-line" id="hint-message-line">玩法：拿宝石、买卡、抢贵族，先到15分触发终局</div>
            <div class="general-hint-line" id="hint-score-line">当前分数：--</div>
            <div class="general-hint-line" id="hint-winrate-line">对手预估胜率：--</div>
            <div class="general-hint-line" id="hint-suggest-line">AI 提示：--</div>
          </div>

          <div class="table-head">
            <div class="bank-area">
              <div class="bank-head-line">
                <h3>银行宝石</h3>
                <div id="turn-index-badge" class="turn-index-badge">第--回合</div>
              </div>
              <div id="bank-row" class="bank-row"></div>
              <div id="gem-pick-status" class="muted inline-title">操作：点击宝石堆选择，三色点三次/同色点两次，然后点确认。</div>
              <div class="inline-ops">
                <button id="btn-gem-confirm" class="inline-op-btn" type="button">确认拿宝石</button>
                <button id="btn-gem-cancel" class="inline-op-btn" type="button">取消选择</button>
                <button id="btn-pass-inline" class="inline-op-btn" type="button">跳过回合</button>
              </div>
              <div class="muted" id="pending-return-msg"></div>
            </div>
            <div class="nobles-area">
              <h3>贵族</h3>
              <div id="nobles-row" class="nobles-row"></div>
            </div>
          </div>

          <div class="tableau-wrap">
            <h3>桌面开发卡（T3/T2/T1）</h3>
            <div id="tableau-root"></div>
          </div>

          <div class="players-wrap">
            <div class="player-card">
              <div class="player-title" id="p0-title">玩家0</div>
              <div class="player-meta" id="p0-meta"></div>
              <div class="player-stat-group">
                <div class="player-stat-label">宝石 <span id="p0-gems-total" class="player-stat-extra">总数:0</span></div>
                <div class="token-row" id="p0-gems"></div>
              </div>
              <div class="player-stat-group">
                <div class="player-stat-label">发展卡</div>
                <div class="bonus-row" id="p0-bonuses"></div>
              </div>
              <div class="reserve-row" id="p0-reserved"></div>
            </div>
            <div class="player-card">
              <div class="player-title" id="p1-title">玩家1</div>
              <div class="player-meta" id="p1-meta"></div>
              <div class="player-stat-group">
                <div class="player-stat-label">宝石 <span id="p1-gems-total" class="player-stat-extra">总数:0</span></div>
                <div class="token-row" id="p1-gems"></div>
              </div>
              <div class="player-stat-group">
                <div class="player-stat-label">发展卡</div>
                <div class="bonus-row" id="p1-bonuses"></div>
              </div>
              <div class="reserve-row" id="p1-reserved"></div>
            </div>
          </div>

        </div>
      </section>
    </main>

    <div class="zoom-controls" id="zoom-controls" aria-label="缩放控制">
      <button id="btn-zoom-out" class="zoom-btn" type="button" title="缩小">-</button>
      <span id="zoom-value" class="zoom-value">100%</span>
      <button id="btn-zoom-in" class="zoom-btn" type="button" title="放大">+</button>
    </div>

    <script type="module" src="web/app.js"></script>
  </body>
</html>
